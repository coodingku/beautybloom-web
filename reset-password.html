<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Beauty Bloom 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="supabase-online.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #fff0f3; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .reset-card { background: white; border-radius: 30px; padding: 40px; width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(255, 133, 162, 0.2); text-align: center; }
        .btn-pink { background: linear-gradient(135deg, #ff85a2 0%, #f72585 100%); color: white; transition: 0.3s; }
    </style>
</head>
<body>

<div class="reset-card" id="form-container">
    <div id="loader">
        <p class="text-pink-500 font-bold animate-pulse">Memverifikasi link reset... 🌸</p>
    </div>

    <div id="reset-form" class="hidden">
        <h1 class="text-2xl font-black text-slate-800 mb-2">Password Baru 🔑</h1>
        <p class="text-sm text-slate-400 mb-8">Silakan masukkan password baru kamu untuk akun Beauty Bloom.</p>

        <div class="space-y-4 text-left">
            <div>
                <label class="text-[10px] font-bold text-pink-400 ml-2 uppercase">Password Baru</label>
                <input type="password" id="new-password" placeholder="Minimal 6 karakter" class="w-full p-4 rounded-2xl border border-pink-50 outline-none focus:border-pink-300 transition-all text-sm mt-1">
            </div>
            <div>
                <label class="text-[10px] font-bold text-pink-400 ml-2 uppercase">Konfirmasi Password</label>
                <input type="password" id="confirm-password" placeholder="Ulangi password" class="w-full p-4 rounded-2xl border border-pink-50 outline-none focus:border-pink-300 transition-all text-sm mt-1">
            </div>
        </div>

        <button onclick="updatePassword()" id="btnUpdate" class="w-full btn-pink py-4 rounded-2xl font-black tracking-widest mt-8 shadow-lg active:scale-95">
            SIMPAN PASSWORD ✨
        </button>
    </div>
</div>

<script>
    // 1. TANGKAP SESI DARI URL SAAT HALAMAN DIBUKA
    window.onload = async () => {
        const { data, error } = await db.auth.getSession();

        if (error || !data.session) {
            alert("Sesi reset tidak ditemukan atau sudah kadaluwarsa. ❌\nSilakan minta link baru di halaman login.");
            window.location.href = 'login-customer.html';
            return;
        }

        // Jika sesi ada, tampilkan form
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('reset-form').classList.remove('hidden');
    };

    async function updatePassword() {
        const password = document.getElementById('new-password').value;
        const confirm = document.getElementById('confirm-password').value;
        const btn = document.getElementById('btnUpdate');

        if (password.length < 6) return alert("Password minimal 6 karakter ya! 🌸");
        if (password !== confirm) return alert("Password tidak cocok! ❌");

        btn.innerText = "MENYIMPAN...";
        btn.disabled = true;

        try {
            // Perbarui password user yang sedang aktif sesinya
            const { error } = await db.auth.updateUser({ password: password });

            if (error) throw error;

            alert("Password berhasil diperbarui! ✨\nSilakan login kembali.");
            
            // Logout agar sesi reset selesai sepenuhnya
            await db.auth.signOut();
            window.location.href = 'login-customer.html';

        } catch (err) {
            alert("Gagal memperbarui: " + err.message);
            btn.innerText = "SIMPAN PASSWORD ✨";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
