<script>
    let shopCart = JSON.parse(localStorage.getItem('finexcart')) || [];
    let userData = null;
    let activeTrx = null;


    window.onload = async () => {
        const { data: { session } } = await db.auth.getSession();
        if (!session) return window.location.replace('login-customer.html');
        loadCustomerData(session.user.id);
        loadOnlineMenu();
        updateCartDisplay();
        // TAMPILKAN IKLAN SETIAP KALI LOGIN/REFRESH HALAMAN UTAMA
        setTimeout(showPromoPopup, 800);
    };

  async function loadCustomerData(userId) {
    // 1. Ambil data customer
    const { data: customer } = await db.from('customers').select('*').eq('id', userId).single();
    
    // 2. Ambil pengaturan target belanja dari Admin (app_settings)
    const { data: settings } = await db.from('app_settings')
        .select('*')
        .eq('key_name', 'loyalty_target_count')
        .single();

    // Default ke 5 jika data di database tidak ditemukan
    const targetCount = settings ? settings.value_int : 5;

    if (customer) {
        userData = customer;
        document.getElementById('welcome-msg').innerText = `Halo, ${customer.full_name.split(' ')[0]}! ✨`;
        document.getElementById('w-saldo').innerText = "Rp " + (customer.saldo || 0).toLocaleString();
        
        // Kirim targetCount ke fungsi render
        renderRewardStatus(customer, targetCount);
        loadWalletHistory(userId);
    }
}

   function renderRewardStatus(profile, target) {
    const container = document.getElementById('reward-section');
    const count = profile.total_order_count || 0;
    const claimed = profile.is_reward_claimed;

    if (count >= target && !claimed) {
        container.innerHTML = `
            <div class="bg-gradient-to-r from-pink-500 to-rose-400 p-4 rounded-3xl text-white shadow-md">
                <p class="text-[9px] font-black uppercase tracking-tighter mb-1">Reward Member 🎁</p>
                <h4 class="text-xs font-bold mb-3">Syarat ${target}x belanja terpenuhi!</h4>
                <button onclick="claimRewardMember()" class="w-full py-2 bg-white text-pink-500 rounded-xl font-black text-[10px] uppercase shadow-sm">Klaim Diskon Sekarang</button>
            </div>`;
    } else if (claimed) {
        container.innerHTML = `
            <div class="bg-green-50 p-4 rounded-3xl border border-green-100 text-center">
                <p class="text-[10px] font-black text-green-600 uppercase">Diskon Member Aktif ✨</p>
                <p class="text-[8px] text-green-400 font-bold mt-1">Cek diskonmu otomatis di Checkout!</p>
            </div>`;
    } else {
        let sisa = target - count;
        // Hitung persentase progres secara dinamis
        let progress = (count / target) * 100;
        
        container.innerHTML = `
            <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-black text-slate-500 uppercase">Progres Member</span>
                    <span class="text-[10px] font-bold text-pink-500">${count}/${target}</span>
                </div>
                <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden">
                    <div class="bg-pink-400 h-full transition-all duration-500" style="width: ${progress}%"></div>
                </div>
                <p class="text-[8px] text-slate-400 mt-2 font-bold italic">Belanja ${sisa}x lagi untuk dapat diskon khusus.</p>
            </div>`;
    }
}

// --- LOGIKA POPUP PROMO (SETIAP LOGIN) ---
function showPromoPopup() {
    const modal = document.getElementById('promoModal');
    const content = document.getElementById('promoContent');

    // Langsung tampilkan tanpa cek localStorage
    modal.classList.remove('hidden');
    
    // Animasi Masuk Smooth
    setTimeout(() => {
        content.classList.remove('scale-90', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');
    }, 300);
}

function closePromo() {
    const modal = document.getElementById('promoModal');
    const content = document.getElementById('promoContent');

    content.classList.remove('scale-100', 'opacity-100');
    content.classList.add('scale-90', 'opacity-0');

    setTimeout(() => {
        modal.classList.add('hidden');
    }, 300);
}
// Panggil fungsi ini di dalam window.onload yang sudah ada
const originalOnload = window.onload;
window.onload = async () => {
    if (originalOnload) await originalOnload();
    
    // Tampilkan popup setelah delay 1.5 detik agar user tidak kaget
    setTimeout(showPromoPopup, 1500);
};
    

    async function claimRewardMember() {
        if (!userData) return;
        const { error } = await db.from('customers')
            .update({ is_reward_claimed: true })
            .eq('id', userData.id);

        if (!error) {
            alert("Reward diklaim! Diskon otomatis akan muncul saat kamu checkout minimal 200rb. 🌸");
            location.reload();
        }
    }

    // LOGIKA PRODUK & HARGA
    function getActivePrice(p) {
        let basePrice = (p.harga_online > 0) ? p.harga_online : p.harga_jual;
        if (!p.is_diskon) return { price: basePrice, isDiscount: false, normal: basePrice };
        const skrg = new Date().getTime();
        const tglM = p.diskon_mulai ? new Date(p.diskon_mulai).getTime() : null;
        const tglA = p.diskon_akhir ? new Date(p.diskon_akhir).getTime() : null;
        const active = p.is_diskon && (!tglM || skrg >= tglM) && (!tglA || skrg <= tglA);
        return { price: active ? basePrice - (p.nominal_diskon || 0) : basePrice, isDiscount: active, normal: basePrice };
    }

  // 1. Update loadOnlineMenu agar mengirim data image_url_2 dan 3
async function loadOnlineMenu() {
    const q = document.getElementById('search').value;
    let query = db.from('produk').select('*').gt('stok_sekarang', 0).eq('tampil_online', true);
    if (q) query = query.ilike('nama_barang', `%${q}%`);
    const { data } = await query.order('nama_barang');
    const display = document.getElementById('onlineDisplay');
    if (!data) return;
    
    display.innerHTML = data.map(p => {
        const pr = getActivePrice(p);
        // Perhatikan parameter di openDetail ditambah p.image_url_2 dan p.image_url_3
        return `
        <div class="product-card" onclick="openDetail('${p.id}', '${p.nama_barang}', ${pr.price}, ${pr.normal}, '${p.image_url}', '${p.keterangan || ''}', '${p.image_url_2}', '${p.image_url_3}')">
            ${pr.isDiscount ? `<div class="badge-diskon">PROMO ✨</div>` : ''}
            <div class="img-container"><img src="${p.image_url || 'https://placehold.co/300'}" onerror="this.src='https://placehold.co/300'"></div>
            <div class="p-4">
                <h4 class="font-bold text-slate-700 text-[11px] truncate uppercase">${p.nama_barang}</h4>
                <div class="mt-1">
                    <p class="text-[9px] text-slate-400 ${pr.isDiscount ? 'line-through' : ''}">Rp ${pr.normal.toLocaleString()}</p>
                    <p class="font-black text-[#ff85a2] text-sm">Rp ${pr.price.toLocaleString()}</p>
                </div>
                <button onclick="event.stopPropagation(); addToOnlineCart('${p.id}', '${p.nama_barang}', ${pr.price}, ${pr.normal})" class="w-full mt-3 bg-pink-50 text-pink-500 py-2 rounded-xl text-[10px] font-black active:scale-95 transition-all">TAMBAH ✨</button>
            </div>
        </div>`;
    }).join('');
}

// Fungsi untuk tombol panah
function scrollSlider(direction) {
    const slider = document.getElementById('image-slider');
    const scrollAmount = slider.clientWidth; // Geser sejauh lebar slider
    slider.scrollBy({
        left: direction * scrollAmount,
        behavior: 'smooth'
    });
}

function openDetail(id, nama, harga, hargaNormal, img, desc, img2, img3) {
    const slider = document.getElementById('image-slider');
    const dots = document.getElementById('slider-dots');
    
    // Filter gambar (hanya yang berisi URL)
    const images = [img, img2, img3].filter(url => url && url !== 'null' && url !== '' && url !== 'undefined');

    // Render Gambar
    slider.innerHTML = images.map(url => `
        <div class="min-w-full h-full snap-center flex-shrink-0">
            <img src="${url}" class="w-full h-full object-cover">
        </div>
    `).join('');

    // Fungsi update dots
    const updateDots = (index) => {
        dots.innerHTML = images.length > 1 ? images.map((_, i) => `
            <div class="w-2 h-2 rounded-full transition-all duration-300 ${i === index ? 'bg-pink-500 w-4' : 'bg-pink-200'}"></div>
        `).join('') : '';
    };

    // Inisialisasi awal
    updateDots(0);
    slider.scrollLeft = 0;

    // Deteksi scroll manual (swipe) untuk update dots
    slider.onscroll = () => {
        const index = Math.round(slider.scrollLeft / slider.clientWidth);
        updateDots(index);
    };

    // Set Data Teks
    document.getElementById('detail-name').innerText = nama;
    document.getElementById('detail-price').innerText = "Rp " + harga.toLocaleString();
    document.getElementById('detail-desc').innerText = desc || 'Rahasia cantikmu.';
    
    document.getElementById('btn-add-modal').onclick = () => { 
        addToOnlineCart(id, nama, harga, hargaNormal); 
        closeAllModals(); 
    };

    document.getElementById('productDetailModal').classList.add('active');
    document.getElementById('modalOverlay').classList.add('active');
}
    function addToOnlineCart(id, nama, hargaFinal, hargaNormal) {
        const idx = shopCart.findIndex(c => c.id === id);
        if (idx > -1) shopCart[idx].qty++;
        else shopCart.push({ id, nama, harga: hargaFinal, harga_normal: hargaNormal, qty: 1 });
        updateCartDisplay();
    }

    function updateCartDisplay() {
        const count = shopCart.reduce((total, item) => total + item.qty, 0);
        document.getElementById('cart-count').innerText = count;
        localStorage.setItem('finexcart', JSON.stringify(shopCart));
    }

    function renderCart() {
        const container = document.getElementById('cartList');
        let total = 0;
        if (shopCart.length === 0) {
            container.innerHTML = `<p class="text-center text-slate-300 py-10 italic">Bag kamu kosong 🌸</p>`;
            document.getElementById('cart-total-modal').innerText = "Rp 0";
            return;
        }
        container.innerHTML = shopCart.map((item, index) => {
            total += (item.harga * item.qty);
            return `
            <div class="flex items-center gap-4 bg-pink-50/30 p-3 rounded-2xl border border-pink-50">
                <div class="flex-1"><h4 class="font-bold text-slate-800 text-[11px] truncate uppercase">${item.nama}</h4><p class="text-pink-500 font-black text-[10px]">Rp ${item.harga.toLocaleString()}</p></div>
                <div class="flex items-center gap-3 bg-white px-3 py-1 rounded-xl shadow-sm">
                    <button onclick="updateQty(${index}, -1)" class="text-pink-400 font-bold">-</button>
                    <span class="text-xs font-black text-slate-700">${item.qty}</span>
                    <button onclick="updateQty(${index}, 1)" class="text-pink-400 font-bold">+</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('cart-total-modal').innerText = "Rp " + total.toLocaleString();
    }

    function updateQty(index, change) {
        shopCart[index].qty += change;
        if (shopCart[index].qty <= 0) shopCart.splice(index, 1);
        updateCartDisplay();
        renderCart();
    }

   function goToCheckout(mode = 'VIEW') {
    if (shopCart.length > 0) {
        if (mode === 'PROSES') {
            // Jika mode PROSES, langsung pindah halaman
            window.location.href = "online-checkout.html";
        } else {
            // Jika mode VIEW (default), tampilkan modal keranjang
            renderCart();
            document.getElementById('cartModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        }
    } else {
        alert("Pilih Produk dulu ya Kak! 🌸");
    }
}

            localStorage.removeItem('finexcart');
            window.location.replace('login-customer.html');
        }
    }

    // LOGIKA SALDO & WALLET
    function toggleWallet() { document.getElementById('walletModal').classList.toggle('active'); document.getElementById('modalOverlay').classList.toggle('active'); }
    
    async function requestTopUp() {
        const nom = prompt("Nominal Top Up (Min Rp 10.000):", "50000");
        if (!nom || nom < 10000) return alert("Min Rp 10.000");
        const inv = "TOPUP-" + Date.now();
        await db.from('topup_history').insert([{ no_invoice: inv, customer_id: userData.id, nominal: parseInt(nom), status: 'PENDING' }]);
        try {
            const res = await fetch("https://uojhjskgugghwxtdsfvm.supabase.co/functions/v1/smart-endpoint", {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: inv, amount: parseInt(nom), customer_name: userData.full_name, customer_email: userData.email })
            });
            const d = await res.json();
            if (d.token) window.snap.pay(d.token, { onSuccess: () => location.reload() });
        } catch (e) { alert("Sibuk."); }
    }

   async function requestWithdraw() {
    // 1. Cek saldo minimal
    if (userData.saldo < 10000) {
        return alert("Saldo minimal untuk penarikan adalah Rp 10.000 🌸");
    }

    // 2. Input Data Nominal
    const amount = prompt(`Berapa saldo yang ingin ditarik?\n(Maksimal: Rp ${userData.saldo.toLocaleString()})`, userData.saldo);
    if (!amount || isNaN(amount) || amount > userData.saldo || amount < 10000) {
        return alert("Nominal tidak valid atau saldo tidak cukup.");
    }

    // 3. Input Data Rekening
    const bank = prompt("Nama Bank (Contoh: BCA / Dana / Mandiri):");
    if (!bank) return;
    const noRek = prompt("Nomor Rekening / Nomor HP:");
    if (!noRek) return;
    const an = prompt("Nama Pemilik Rekening (Atas Nama):");
    if (!an) return;

    const inv = "WD-" + Date.now();

    // 4. Simpan ke Database
    const { error } = await db.from('withdraw_requests').insert([{
        no_invoice: inv,
        customer_id: userData.id,
        nominal: parseInt(amount),
        bank_name: bank,
        account_number: noRek,
        account_name: an,
        status: 'PENDING'
    }]);

    if (!error) {
        // 5. FORMAT PESAN WA SESUAI PERMINTAAN KAMU
        const pesan = `Halo Admin Beauty Bloom! 🌸%0A%0ASaya ingin *TARIK SALDO*%0ANo Ref: ${inv}%0ANama: ${userData.full_name}%0ANominal: *Rp ${parseInt(amount).toLocaleString()}*%0A%0A*Tujuan Transfer:*%0ABank: ${bank}%0ANo Rek: ${noRek}%0AA/n: ${an}%0A%0AMohon segera diproses ya, terima kasih! ✨`;
        
        // Membuka WhatsApp
        window.open(`https://wa.me/6281239739396?text=${pesan}`, '_blank');
        
        alert("Permintaan penarikan berhasil dikirim! 🌸");
        location.reload(); 
    } else {
        alert("Gagal mengirim permintaan ke sistem.");
        console.error(error);
    }
}
    async function loadWalletHistory(userId) {
        const { data: t } = await db.from('topup_history').select('*').eq('customer_id', userId);
        const { data: w } = await db.from('withdraw_requests').select('*').eq('customer_id', userId);
        let combined = [];
        if (t) combined.push(...t.map(i => ({ ...i, jenis: 'ISI SALDO' })));
        if (w) combined.push(...w.map(i => ({ ...i, jenis: 'PENARIKAN' })));
        combined.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        const container = document.getElementById('walletHistory');
        if (combined.length > 0) {
            container.innerHTML = combined.slice(0, 10).map(h => {
                let color = h.status === 'SUCCESS' ? 'text-green-500' : (h.status === 'PENDING' ? 'text-orange-400' : 'text-red-500');
                let simbol = h.jenis === 'ISI SALDO' ? '+' : '-';
                return `
                <div class="bg-white border border-slate-50 p-4 rounded-2xl text-[10px] mb-2">
                    <div class="flex justify-between items-start">
                        <div><p class="font-black text-slate-800 uppercase">${h.no_invoice}</p><p class="text-slate-400">${new Date(h.created_at).toLocaleDateString()} • ${h.jenis}</p></div>
                        <div class="text-right"><p class="font-black">${simbol} Rp ${h.nominal.toLocaleString()}</p><p class="font-bold uppercase ${color}" style="font-size: 8px;">${h.status}</p></div>
                    </div>
                </div>`;
            }).join('');
        } else container.innerHTML = `<p class="text-center text-slate-300 py-5 italic text-[10px]">Kosong 🌸</p>`;
    }

  // 1. Fungsi untuk Pesanan yang MASIH PROSES (Tombol Navigasi Bawah)
async function openActivity() {
    const { data } = await db.from('transaksi_online')
        .select('*')
        .eq('customer_id', userData.id)
        .order('created_at', { ascending: false });

    const container = document.getElementById('activityList');
    
    // Filter hanya status yang BELUM selesai/batal
    const activeOrders = data ? data.filter(trx => !['Selesai', 'Dibatalkan'].includes(trx.status_order)) : [];

    if (activeOrders.length > 0) {
        container.innerHTML = renderOrderCards(activeOrders);
    } else {
        container.innerHTML = `
            <div class="text-center py-10">
                <div class="text-4xl mb-4">✨</div>
                <p class="italic text-slate-400 text-xs font-bold">Semua pesanan sudah selesai.<br>Ayo belanja lagi!</p>
            </div>`;
    }
    
    document.getElementById('activityModal').classList.add('active');
    document.getElementById('modalOverlay').classList.add('active');
}

// 2. Fungsi untuk RIWAYAT (Selesai & Batal)
async function openHistory() {
    const { data } = await db.from('transaksi_online')
        .select('*')
        .eq('customer_id', userData.id)
        .order('created_at', { ascending: false });

    const container = document.getElementById('historyList');
    
    // Filter hanya status Selesai atau Dibatalkan
    const historyOrders = data ? data.filter(trx => ['Selesai', 'Dibatalkan'].includes(trx.status_order)) : [];

    if (historyOrders.length > 0) {
        container.innerHTML = renderOrderCards(historyOrders);
    } else {
        container.innerHTML = `<p class="text-center py-10 italic text-slate-400 text-xs">Belum ada riwayat pesanan 🌸</p>`;
    }

    closeAllModals(); // Tutup profil modal dulu
    setTimeout(() => {
        document.getElementById('historyModal').classList.add('active');
        document.getElementById('modalOverlay').classList.add('active');
    }, 100);
}

// 3. Helper Fungsi untuk Render Kartu (Agar kode tidak duplikat)
function renderOrderCards(orders) {
    return orders.map(trx => {
        const s = (trx.status_order || 'pending');
        const sLower = s.toLowerCase();
        const str = JSON.stringify(trx).replace(/'/g, "&apos;");
        const btnB = sLower === 'pending' ? `<button onclick="cancelOrder('${trx.id}', '${trx.no_invoice}')" class="text-[9px] font-bold text-red-400 border border-red-100 px-3 py-2 rounded-xl">Batal</button>` : '';
        
        return `
        <div class="bg-white border border-pink-50 p-5 rounded-[25px] shadow-sm mb-4 text-xs">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <p class="font-black text-pink-300 uppercase">${trx.no_invoice}</p>
                    <p class="text-slate-400 text-[10px] font-bold">${new Date(trx.created_at).toLocaleDateString()}</p>
                </div>
                <span class="status-badge status-${sLower}">${s}</span>
            </div>
            <div class="flex justify-between items-end border-t border-dashed border-pink-100 pt-3">
                <p class="font-black text-slate-800">Rp ${parseFloat(trx.grand_total).toLocaleString()}</p>
                <div class="flex gap-2">
                    ${btnB}
                    <button onclick='viewDetailTrx(${str})' class="bg-slate-900 text-white text-[9px] font-black px-4 py-2 rounded-xl uppercase tracking-widest">Detail</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

// Tambahkan CSS status khusus untuk "Selesai" di dalam <style> jika belum ada
// .status-selesai { background: #dcfce7; color: #16a34a; }

function closeAllModals() {
    const modals = [
        'cartModal', 'profileModal', 'walletModal', 
        'activityModal', 'trxDetailModal', 'productDetailModal', 
        'modalOverlay', 'historyModal' // Tambahkan historyModal di sini
    ];
    modals.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('active');
    });
}
    
async function viewDetailTrx(trx) {
    activeTrx = trx;
    
    // 1. Tampilkan status pengecekan live
    document.getElementById('v-status').innerText = "MENGECEK PEMBAYARAN... ✨";
    document.getElementById('v-invoice').innerText = trx.no_invoice;
    document.getElementById('v-total').innerText = "Rp " + parseFloat(trx.grand_total || 0).toLocaleString();

    // 2. LOGIKA CEK STATUS LIVE KE SMART-ENDPOINT
    if (trx.status_order.toUpperCase() === 'PENDING') {
        try {
            const { data: sync, error } = await db.functions.invoke('smart-endpoint', {
                body: { 
                    action: 'check_status', 
                    order_id: trx.no_invoice 
                }
            });

            // FIX: Cek status 'settlement' atau 'capture' (Ini standar dari Midtrans)
            if (sync && (sync.status === 'settlement' || sync.status === 'capture')) {
                
                // --- KUNCI: UPDATE DATABASE JADI 'Dikemas' ---
                const { error: dbError } = await db.from('transaksi_online')
                    .update({ status_order: 'Dikemas' })
                    .eq('no_invoice', trx.no_invoice);

                if (!dbError) {
                    trx.status_order = 'Dikemas'; // Ubah tampilan lokal agar customer senang
                    console.log("Database updated: Dikemas");
                }
            } 
            // JIKA EXPIRED
            else if (sync && sync.status === 'expire') {
                await db.from('transaksi_online')
                    .update({ status_order: 'Dibatalkan' })
                    .eq('no_invoice', trx.no_invoice);
                trx.status_order = 'Dibatalkan';
            }
        } catch (e) {
            console.log("Belum ada dana masuk di Midtrans.");
        }
    }

    // 3. Render Status Akhir ke Layar (Gunakan huruf kapital agar rapi)
    document.getElementById('v-status').innerText = trx.status_order.toUpperCase();
    
    // 4. Render Item Produk
    const container = document.getElementById('v-items');
    let items = [];
    try {
        items = typeof trx.items === 'string' ? JSON.parse(trx.items) : trx.items;
    } catch (e) { console.error("Data produk tidak terbaca"); }

    if (items && Array.isArray(items)) {
        container.innerHTML = items.map(it => `
            <div class="flex justify-between bg-slate-50 p-3 rounded-xl mb-2 text-[11px]">
                <div class="flex-1 font-bold text-slate-700">${it.nama || it.nama_barang || it.name} (${it.qty}x)</div>
                <p class="font-bold text-slate-800">Rp ${(it.qty * (it.harga || 0)).toLocaleString()}</p>
            </div>`).join('');
    } else {
        container.innerHTML = `<p class="text-center text-slate-400 py-4 text-[10px]">Rincian produk tidak tersedia.</p>`;
    }

    // 5. LOGIKA TOMBOL WA
    const btnWA = document.querySelector('[onclick="confirmToAdmin()"]');
    btnWA.style.display = "flex"; 

    const statusSekarang = trx.status_order; // Tidak perlu UpperCase di sini untuk perbandingan string tepat
    if (statusSekarang === 'Dikemas' || statusSekarang === 'SUDAH BAYAR') {
        btnWA.innerHTML = '<i class="fab fa-whatsapp"></i> KONFIRMASI KEMAS';
        btnWA.className = "flex-1 py-4 bg-blue-500 text-white rounded-2xl font-bold text-xs shadow-lg flex items-center justify-center gap-2";
    } else if (statusSekarang === 'Dibatalkan' || statusSekarang === 'DIBATALKAN') {
        btnWA.innerHTML = '<i class="fab fa-whatsapp"></i> TANYA ADMIN (BATAL)';
        btnWA.className = "flex-1 py-4 bg-slate-800 text-white rounded-2xl font-bold text-xs shadow-lg flex items-center justify-center gap-2";
    } else {
        btnWA.innerHTML = '<i class="fab fa-whatsapp"></i> KONFIRMASI BAYAR';
        btnWA.className = "flex-1 py-4 bg-[#25D366] text-white rounded-2xl font-bold text-xs shadow-lg flex items-center justify-center gap-2";
    }

    document.getElementById('trxDetailModal').classList.add('active');
    document.getElementById('modalOverlay').classList.add('active');
}
// 2. FUNGSI BATAL PESANAN DENGAN ALASAN & WA
async function cancelOrder(id, inv) {
    const alasan = prompt("Mohon maaf admin pesanan saya sudah saya batalkan dengan alasan:");
    
    if (alasan !== null && alasan !== "") {
        const { error } = await db.from('transaksi_online')
            .update({ status_order: 'Dibatalkan' })
            .eq('id', id);

        if (!error) {
            const pesanBatal = `Halo Admin Beauty Bloom! 🌸%0A%0AMohon maaf admin, pesanan saya dengan nomor *${inv}* sudah saya *BATALKAN*.%0A%0A*Alasan:* ${alasan}%0A%0AMohon maaf atas ketidaknyamanannya, terima kasih. 🙏`;
            window.open(`https://wa.me/6281239739396?text=${pesanBatal}`, '_blank');
            
            alert("Pesanan berhasil dibatalkan 🌸");
            openActivity(); 
        } else {
            alert("Gagal membatalkan pesanan di database.");
        }
    } else if (alasan === "") {
        alert("Alasan harus diisi ya cantik! 😊");
    }
}

function confirmToAdmin() {
    if (!activeTrx) return;
    
    let pesanWA = "";
    const noInv = activeTrx.no_invoice;
    const total = parseFloat(activeTrx.grand_total || 0).toLocaleString();

    if (activeTrx.status_order === 'Dikemas' || activeTrx.status_order === 'Sudah Bayar') {
        pesanWA = `Halo Admin Beauty Bloom! 🌸%0ASaya sudah membayar pesanan *${noInv}*%0AMohon segera diproses  ya kak! ✨`;
    } else if (activeTrx.status_order === 'Dibatalkan') {
        pesanWA = `Halo Admin Beauty Bloom! 🌸%0ASaya ingin bertanya mengenai pesanan *${noInv}* yang berstatus *DIBATALKAN*. Mohon informasinya ya kak. 🙏`;
    } else if (activeTrx.status_order === 'Selesai') {
        pesanWA = `Halo Admin Beauty Bloom! 🌸%0APesanan *${noInv}* sudah saya terima. Terima kasih ya kak! ✨`;
    } else {
        pesanWA = `Halo Admin Beauty Bloom! 🌸%0ASaya ingin konfirmasi pesanan *${noInv}* (Rp ${total}). Mohon instruksi pembayarannya kak. ✨`;
    }

    window.open(`https://wa.me/6281239739396?text=${pesanWA}`, '_blank');
}
    function closeAllModals() { document.querySelectorAll('.side-modal, .activity-modal, .detail-modal, .modal-overlay').forEach(el => el.classList.remove('active')); }
