<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finex Beauty Bloom | Online Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="supabase-online.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary-pink: #ff85a2; --soft-pink: #fff0f3; --deep-pink: #f72585; --accent-peach: #ffb3c1; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--soft-pink); }
        .glass-header { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 133, 162, 0.2); }
        .product-card { background: white; border-radius: 28px; overflow: hidden; transition: all 0.3s ease; border: 1px solid rgba(255, 133, 162, 0.1); box-shadow: 0 4px 15px rgba(255, 133, 162, 0.05); }
        .product-card:active { transform: scale(0.96); }
        .img-container { aspect-ratio: 1 / 1; overflow: hidden; background: #fffafa; cursor: pointer; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(247, 37, 133, 0.1); backdrop-filter: blur(4px); display: none; z-index: 999; }
        .modal-overlay.active { display: block; }
        .detail-modal, .activity-modal { position: fixed; bottom: -100%; left: 0; right: 0; background: white; z-index: 1000; border-radius: 35px 35px 0 0; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 -15px 35px rgba(0,0,0,0.1); }
        .detail-modal.active, .activity-modal.active { bottom: 0; }
        .profile-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 90%; max-width: 400px; background: white; border-radius: 35px; z-index: 2000; display: none; opacity: 0; transition: all 0.3s ease; padding: 30px; }
        .profile-modal.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .input-bloom { width: 100%; padding: 12px 15px; background: var(--soft-pink); border: 1px solid rgba(255, 133, 162, 0.1); border-radius: 15px; font-size: 14px; outline: none; margin-bottom: 12px; }
        .input-bloom:focus { border-color: var(--primary-pink); background: white; }
        .img-container img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Ini penting agar gambar terpotong rapi di tengah */
}

        /* STATUS COLORS */
        .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-pending { background: #fee2e2; color: #ef4444; } /* Merah */
        .status-dibayar { background: #e0f2fe; color: #0284c7; } /* Biru */
        .status-dikemas { background: #fef3c7; color: #d97706; } /* Kuning */
        .status-dikirim { background: #dcfce7; color: #16a34a; } /* Hijau */
        .status-selesai { background: #f3e8ff; color: #7e22ce; } /* Ungu */

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0 25px 0; box-shadow: 0 -10px 25px rgba(255, 133, 162, 0.1); border-radius: 30px 30px 0 0; z-index: 100; }
        @keyframes pulse-pink { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .cart-animate { animation: pulse-pink 0.3s ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-28">

    <header class="glass-header sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div>
            <p class="text-[10px] font-bold text-[#ff4d6d] uppercase tracking-widest">Finex Store</p>
            <h1 class="text-xl font-extrabold text-slate-800">Beauty Bloom 🌸</h1>
        </div>
        <button onclick="openProfile()" class="w-10 h-10 bg-pink-50 rounded-full border border-pink-100 text-pink-500 flex items-center justify-center shadow-sm">
            <i class="fa-solid fa-user-heart"></i>
        </button>
    </header>

    <section class="px-6 mt-6">
        <div class="relative group">
            <i class="fas fa-search absolute left-5 top-4 text-pink-300"></i>
            <input type="text" id="search" onkeyup="loadOnlineMenu()" class="w-full pl-12 pr-4 py-4 bg-white rounded-3xl border-none shadow-sm focus:ring-2 focus:ring-pink-300 outline-none placeholder:text-pink-200" placeholder="Cari perawatan cantikmu...">
        </div>
    </section>

    <main class="px-6 mt-8">
        <div id="onlineDisplay" class="grid grid-cols-2 gap-5"></div>
    </main>

    <div id="modalOverlay" class="modal-overlay" onclick="closeAllModals()"></div>

    <div id="activityModal" class="activity-modal">
        <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto my-4"></div>
        <div class="px-6 pb-10">
            <h2 class="text-xl font-black text-slate-800 mb-2 tracking-tight text-center">Lacak Pesanan 🚚</h2>
            <p class="text-[10px] text-center text-slate-400 font-bold uppercase tracking-widest mb-6">Status pesanan online kamu</p>
            
            <div id="activityList" class="space-y-4 max-h-[50vh] overflow-y-auto pr-2 no-scrollbar">
                </div>
            
            <button onclick="closeAllModals()" class="w-full mt-8 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl active:scale-95 transition-all">Tutup Menu</button>
        </div>
    </div>

    <div id="productDetailModal" class="detail-modal">
        <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto my-4"></div>
        <div class="px-6 pb-10 text-center">
            <div class="aspect-square rounded-[30px] mb-6 overflow-hidden bg-pink-50 h-64 mx-auto border-4 border-white shadow-lg">
                <img id="detail-img" src="" class="w-full h-full object-cover">
            </div>
            <h2 id="detail-name" class="text-2xl font-black text-slate-800 leading-tight px-4"></h2>
            <p id="detail-price" class="text-xl font-black text-[#f72585] mt-2"></p>
            <p id="detail-desc" class="text-slate-400 text-sm leading-relaxed my-6 px-4"></p>
            <button id="btn-add-modal" class="w-full py-5 bg-gradient-to-r from-[#ff85a2] to-[#f72585] text-white rounded-[22px] font-black shadow-lg shadow-pink-100 active:scale-95 transition-all">TAMBAH KERANJANG ✨</button>
        </div>
    </div>

    <div id="profileModal" class="profile-modal">
        <div class="text-center mb-6">
            <i class="fa-solid fa-circle-user text-5xl text-pink-200"></i>
            <h2 class="text-xl font-black mt-2">Akun Saya</h2>
        </div>
        <input type="text" id="p-name" class="input-bloom" placeholder="Nama Lengkap">
        <input type="text" id="p-email" class="input-bloom opacity-50" readonly>
        <input type="number" id="p-phone" class="input-bloom" placeholder="628xxx">
        <textarea id="p-address" class="input-bloom h-20 resize-none" placeholder="Alamat Lengkap"></textarea>
        <button onclick="saveProfile()" id="btnSaveProfile" class="w-full py-4 bg-[#f72585] text-white rounded-2xl font-bold mt-4 shadow-lg active:scale-95 transition-all">SIMPAN PERUBAHAN</button>
        <button onclick="logoutCustomer()" class="w-full mt-6 text-[10px] text-slate-300 font-bold uppercase tracking-widest">Logout Akun</button>
    </div>

    <nav class="bottom-nav">
        <a href="online-shop.html" class="flex flex-col items-center text-[#ff85a2]">
            <i class="fas fa-home text-2xl"></i>
            <span class="text-[9px] font-black mt-1 uppercase">Beranda</span>
        </a>
        <button onclick="openActivity()" class="flex flex-col items-center text-slate-300">
            <i class="fas fa-receipt text-2xl"></i>
            <span class="text-[9px] font-black mt-1 uppercase">Pesanan</span>
        </button>
        <button onclick="goToCheckout()" class="flex flex-col items-center text-slate-300 relative">
            <i class="fas fa-shopping-bag text-2xl"></i>
            <span id="cart-count" class="absolute -top-2 -right-3 bg-[#f72585] text-white text-[10px] font-black px-2 py-0.5 rounded-full border-2 border-white shadow-sm">0</span>
            <span class="text-[9px] font-black mt-1 uppercase">Keranjang</span>
        </button>
        <button onclick="openProfile()" class="flex flex-col items-center text-slate-300">
            <i class="fas fa-user-circle text-2xl"></i>
            <span class="text-[9px] font-black mt-1 uppercase">Profil</span>
        </button>
    </nav>

<script>
    let shopCart = [];

    window.onload = async () => {
        const { data: { session } } = await db.auth.getSession();
        if (!session) window.location.replace('login-customer.html');
        loadOnlineMenu();
    };

   async function loadOnlineMenu() {
        const q = document.getElementById('search').value;
        // Kita pastikan mengambil image_url
        let query = db.from('produk').select('*').gt('stok_sekarang', 0);
        
        if (q) query = query.ilike('nama_barang', `%${q}%`);
        
        const { data } = await query.order('nama_barang');
        
        document.getElementById('onlineDisplay').innerHTML = (data || []).map(p => `
            <div class="product-card">
                <div class="img-container" onclick="openDetail('${p.id}', '${p.nama_barang}', ${p.harga_jual}, '${p.image_url}', '${p.deskripsi || 'Rahasia kecantikan Beauty Bloom.'}')">
                    <img src="${p.image_url || 'https://via.placeholder.com/300'}" 
                         class="w-full h-full object-cover" 
                         onerror="this.src='https://via.placeholder.com/300?text=Beauty+Bloom'">
                </div>
                <div class="p-4 bg-white">
                    <h4 class="font-bold text-slate-700 text-[11px] truncate uppercase tracking-tight">${p.nama_barang}</h4>
                    <div class="flex justify-between items-center mt-3">
                        <p class="font-black text-[#ff85a2] text-sm">Rp ${p.harga_jual.toLocaleString()}</p>
                        <button onclick="addToOnlineCart('${p.id}', '${p.nama_barang}', ${p.harga_jual})" class="bg-pink-50 text-[#ff85a2] w-9 h-9 rounded-xl flex items-center justify-center active:bg-pink-500 active:text-white transition-all"><i class="fas fa-plus text-xs"></i></button>
                    </div>
                </div>
            </div>`).join('');
    }

    // --- FUNGSI AMBIL DATA DARI TABEL TRANSAKSI ONLINE ---
    async function openActivity() {
        const { data: { user } } = await db.auth.getUser();
        // Ambil data dari tabel transaksi_online (Tabel baru khusus online)
        const { data, error } = await db.from('transaksi_online')
            .select('*')
            .eq('customer_id', user.id) 
            .order('created_at', { ascending: false });

        const container = document.getElementById('activityList');
        if (data && data.length > 0) {
            container.innerHTML = data.map(trx => {
                let status = (trx.status_order || 'Pending').toLowerCase();
                return `
                <div class="bg-white border border-pink-50 p-5 rounded-[25px] shadow-sm relative overflow-hidden">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <p class="text-[10px] font-black text-pink-300 uppercase tracking-widest mb-1">${trx.no_invoice}</p>
                            <p class="text-[11px] font-bold text-slate-400">${new Date(trx.created_at).toLocaleDateString('id-ID', {day:'numeric', month:'long'})}</p>
                        </div>
                        <span class="status-badge status-${status}">${trx.status_order}</span>
                    </div>
                    <div class="flex justify-between items-end border-t border-dashed border-pink-100 pt-3 mt-1">
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Total Belanja</p>
                            <p class="font-black text-slate-800">Rp ${parseFloat(trx.grand_total).toLocaleString()}</p>
                        </div>
                        <button onclick="alert('Fitur rincian item segera hadir!')" class="bg-slate-900 text-white text-[9px] font-black px-4 py-2 rounded-xl uppercase tracking-widest">Detail</button>
                    </div>
                </div>`;
            }).join('');
        } else {
            container.innerHTML = `<div class="py-20 text-center"><i class="fa-solid fa-box-open text-4xl text-pink-100 mb-4"></i><p class="text-slate-300 text-xs font-bold">Belum ada pesanan nih, yuk belanja! 🌸</p></div>`;
        }

        document.getElementById('activityModal').classList.add('active');
        document.getElementById('modalOverlay').classList.add('active');
    }

    function openDetail(id, nama, harga, img, desc) {
        document.getElementById('detail-name').innerText = nama;
        document.getElementById('detail-price').innerText = "Rp " + harga.toLocaleString();
        document.getElementById('detail-img').src = img || 'https://via.placeholder.com/300';
        document.getElementById('detail-desc').innerText = desc;
        document.getElementById('btn-add-modal').onclick = () => { addToOnlineCart(id, nama, harga); closeAllModals(); };
        document.getElementById('productDetailModal').classList.add('active');
        document.getElementById('modalOverlay').classList.add('active');
    }

    async function openProfile() {
        const { data: { user } } = await db.auth.getUser();
        const { data } = await db.from('customers').select('*').eq('id', user.id).maybeSingle();
        document.getElementById('p-name').value = data?.full_name || user.user_metadata.full_name || "";
        document.getElementById('p-email').value = user.email;
        document.getElementById('p-phone').value = data?.phone_number || "";
        document.getElementById('p-address').value = data?.address_shipping || "";
        document.getElementById('profileModal').classList.add('active');
        document.getElementById('modalOverlay').classList.add('active');
    }

    async function saveProfile() {
        const { data: { user } } = await db.auth.getUser();
        const btn = document.getElementById('btnSaveProfile');
        btn.innerText = "MENYIMPAN...";
        const { error } = await db.from('customers').upsert({
            id: user.id,
            full_name: document.getElementById('p-name').value,
            phone_number: document.getElementById('p-phone').value,
            address_shipping: document.getElementById('p-address').value,
            email: user.email,
            updated_at: new Date().toISOString()
        });
        if (!error) { alert("Profil Berhasil Diperbarui! ✨"); closeAllModals(); }
        btn.innerText = "SIMPAN PERUBAHAN";
    }

    function addToOnlineCart(id, nama, harga) {
        const idx = shopCart.findIndex(c => c.id === id);
        if (idx > -1) shopCart[idx].qty++; else shopCart.push({ id, nama, harga, qty: 1 });
        const badge = document.getElementById('cart-count');
        badge.innerText = shopCart.reduce((s, i) => s + i.qty, 0);
        badge.classList.add('cart-animate');
        setTimeout(() => badge.classList.remove('cart-animate'), 300);
    }

    function closeAllModals() {
        document.getElementById('productDetailModal').classList.remove('active');
        document.getElementById('profileModal').classList.remove('active');
        document.getElementById('activityModal').classList.remove('active');
        document.getElementById('modalOverlay').classList.remove('active');
    }

    function goToCheckout() {
        if (shopCart.length === 0) return alert("Pilih produk Bloom dulu kak! 🌸");
        sessionStorage.setItem('finexcart', JSON.stringify(shopCart));
        window.location.href = "online-checkout.html";
    }

    async function logoutCustomer() {
        await db.auth.signOut();
        window.location.replace('login-customer.html');
    }
</script>
</body>
</html>
