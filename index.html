<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Beauty Bloom Fashion | Koleksi Import Premium & Terkini 🌸</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-online.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff0f3; margin: 0; scroll-behavior: smooth; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(247, 37, 133, 0.1); }
        
        .slider-container { position: relative; width: 100%; height: 100%; overflow: hidden; border-radius: 35px; }
        .slide-item { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease-in-out; display: none; }
        .slide-item.active { opacity: 1; display: block; }
        .slide-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .dot-ad { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.3s; }
        .dot-ad.active { background: white; width: 20px; border-radius: 10px; }

        #popupAdModal { transition: opacity 0.4s ease-out; pointer-events: none; opacity: 0; display: none; }
        #popupAdModal.flex { display: flex; }
        #popupAdModal.show-modal { opacity: 1; pointer-events: auto; }
        .modal-box { transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .show-modal .modal-box { transform: scale(1); }
    </style>
</head>
<body class="relative">

    <div id="popupAdModal" class="fixed inset-0 z-[1000] items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closePopup()"></div>
        <div class="modal-box relative bg-white rounded-[40px] overflow-hidden max-w-sm w-full shadow-2xl">
            <button onclick="closePopup()" class="absolute top-4 right-4 w-10 h-10 bg-black/20 hover:bg-black/40 text-white rounded-full flex items-center justify-center backdrop-blur-md z-10">
                <i class="fas fa-times"></i>
            </button>
            <div id="popupContent" class="aspect-square bg-slate-100 flex items-center justify-center overflow-hidden"></div>
            <div class="p-6 text-center">
                <button onclick="closePopup()" class="w-full bg-[#f72585] text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg shadow-pink-200">
                    Lihat Koleksi 🌸
                </button>
            </div>
        </div>
    </div>

    <nav class="glass-nav sticky top-0 z-50 px-4 py-3 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#f72585] tracking-tighter uppercase">BeautyBloom</h1>
        <div class="flex gap-3">
            <button onclick="window.location.href='login-customer.html'" class="text-[10px] font-black text-slate-600 px-4 py-2 rounded-full border border-slate-200">MASUK</button>
            <button onclick="window.location.href='register-customer.html'" class="text-[10px] font-black bg-[#f72585] text-white px-5 py-2 rounded-full shadow-lg shadow-pink-200">DAFTAR</button>
        </div>
    </nav>

    <section class="p-4 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 mt-2">
        <div class="md:col-span-2 relative h-56 md:h-80 bg-slate-200 rounded-[35px] overflow-hidden shadow-xl shadow-pink-100">
            <div id="promo-slider" class="slider-container">
                <div class="slide-item active flex items-center justify-center bg-gradient-to-br from-[#ff85a2] to-[#f72585] text-white text-[10px] font-bold uppercase">Memuat...</div>
            </div>
            <div id="promo-dots" class="absolute bottom-5 left-10 flex gap-2 z-20"></div>
        </div>
        <div class="hidden md:flex flex-col gap-4">
            <div class="h-1/2 bg-sky-400 rounded-[30px] p-6 text-white relative overflow-hidden">
                <h3 class="font-black text-lg uppercase leading-tight">Quality <br> Choice 💎</h3>
            </div>
            <div class="h-1/2 bg-orange-400 rounded-[30px] p-6 text-white relative overflow-hidden">
                <h3 class="font-black text-lg uppercase leading-tight">New <br> Arrivals 👗</h3>
            </div>
        </div>
    </section>

    <section class="max-w-6xl mx-auto px-4 mt-10">
        <h3 class="text-xl font-black text-slate-800 italic uppercase mb-8">Exclusive Collection 🌸</h3>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 mb-20"></div>
    </section>

    <footer class="p-8 bg-white rounded-t-[40px] text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
        © 2026 BeautyBloom - Developed By Finex POS System
    </footer>

<script>
    let currentSlide = 0;

    window.onload = () => {
        // Hapus header manual karena menyebabkan "is not a function"
        setTimeout(() => {
            fetchProducts();
            loadDynamicAds();
            loadPopupAd();
        }, 800);
    };

    // --- FIX POPUP: Hapus .headers() ---
    async function loadPopupAd() {
        try {
            if (typeof db === 'undefined') return;

            const { data: popup, error } = await db.from('app_settings')
                .select('value_text, is_active')
                .eq('key_name', 'popup_banner')
                .single();

            if (popup && popup.is_active && popup.value_text) {
                const modal = document.getElementById('popupAdModal');
                document.getElementById('popupContent').innerHTML = `<img src="${popup.value_text}" class="w-full h-full object-cover">`;
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.add('show-modal');
                    document.body.style.overflow = 'hidden'; 
                }, 100);
            }
        } catch (e) { console.error("Popup error:", e); }
    }

    function closePopup() {
        const modal = document.getElementById('popupAdModal');
        modal.classList.remove('show-modal');
        setTimeout(() => { modal.classList.remove('flex'); document.body.style.overflow = ''; }, 400);
    }

    // --- FIX SLIDER: Hapus .headers() ---
    async function loadDynamicAds() {
        try {
            const { data: setting } = await db.from('app_settings')
                .select('value_text, is_active')
                .eq('key_name', 'dashboard_banners')
                .single();

            if (setting?.is_active && setting?.value_text) {
                const adImages = JSON.parse(setting.value_text);
                document.getElementById('promo-slider').innerHTML = adImages.map((imgUrl, i) => `<div class="slide-item ${i === 0 ? 'active' : ''}"><img src="${imgUrl}"></div>`).join('');
                document.getElementById('promo-dots').innerHTML = adImages.map((_, i) => `<div class="dot-ad ${i === 0 ? 'active' : ''}"></div>`).join('');
                startSlider();
            }
        } catch (e) { console.error(e); }
    }

    function startSlider() {
        setInterval(() => {
            const slides = document.querySelectorAll('.slide-item');
            const dots = document.querySelectorAll('.dot-ad');
            if (slides.length <= 1) return;
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
        }, 5000);
    }

    // --- FIX PRODUCTS: Hapus .headers() ---
    async function fetchProducts() {
        try {
            const { data, error } = await db.from('produk')
                .select('*')
                .gt('stok_sekarang', 0)
                .eq('tampil_online', true)
                .order('created_at', { ascending: false });
            
            if (!error) renderProducts(data);
        } catch (e) { console.error(e); }
    }

    function renderProducts(list) {
        document.getElementById('productGrid').innerHTML = list.map(p => `
            <div class="bg-white rounded-[32px] p-3 shadow-sm border border-pink-50 flex flex-col h-full group">
                <div class="aspect-[4/5] bg-slate-50 rounded-[26px] mb-3 overflow-hidden">
                    <img src="${p.image_url || 'https://via.placeholder.com/300x400'}" class="w-full h-full object-cover">
                </div>
                <h4 class="font-bold text-slate-700 text-[11px] uppercase mb-1 line-clamp-2 px-2">${p.nama_barang}</h4>
                <button onclick="handleProductClick()" class="mt-auto w-full bg-slate-50 hover:bg-[#f72585] hover:text-white py-3 rounded-2xl text-[9px] font-black uppercase transition-all tracking-widest border border-pink-50">
                    Cek Detail ✨
                </button>
            </div>
        `).join('');
    }

    async function handleProductClick() {
        const { data: { session } } = await db.auth.getSession();
        if (!session) {
            alert("Silakan Login terlebih dahulu 🌸");
            window.location.href = "login-customer.html";
        } else {
            window.location.href = "online-shop.html"; 
        }
    }
</script>
</body>
</html>
