<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beauty Bloom Fashion | Koleksi Import Premium & Terkini 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-online.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff0f3; margin: 0; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(247, 37, 133, 0.1); }
        .slider-container { position: relative; width: 100%; height: 100%; overflow: hidden; border-radius: 35px; }
        .slide-item { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease-in-out; display: none; }
        .slide-item.active { opacity: 1; display: block; }
        .slide-item img { width: 100%; height: 100%; object-fit: cover; }
        .dot-ad { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.3s; }
        .dot-ad.active { background: white; width: 20px; border-radius: 10px; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); }
        footer { background: #fff; border-top-left-radius: 40px; border-top-right-radius: 40px; }

        /* MODAL ANIMATION */
        #popupAdModal { transition: all 0.4s ease-in-out; }
        .modal-content-scale { transform: scale(0.9); transition: all 0.3s ease-out; }
        .show-modal .modal-content-scale { transform: scale(1); }
    </style>
</head>
<body class="relative">

    <div id="popupAdModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closePopup()"></div>
        <div class="modal-content-scale relative bg-white rounded-[40px] overflow-hidden max-w-sm w-full shadow-2xl">
            <button onclick="closePopup()" class="absolute top-4 right-4 w-10 h-10 bg-black/20 hover:bg-black/40 text-white rounded-full flex items-center justify-center backdrop-blur-md z-10">
                <i class="fas fa-times"></i>
            </button>
            <div id="popupContent">
                </div>
            <div class="p-6 text-center">
                <button onclick="closePopup()" class="w-full bg-[#f72585] text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-pink-200">
                    Lihat Sekarang ✨
                </button>
            </div>
        </div>
    </div>

    <nav class="glass-nav sticky top-0 z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black text-[#f72585] tracking-tighter uppercase">BeautyBloom</h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='login-customer.html'" class="text-[10px] font-black text-slate-600 px-4 py-2 rounded-full border border-slate-200">MASUK</button>
            <button onclick="window.location.href='register-customer.html'" class="text-[10px] font-black bg-[#f72585] text-white px-5 py-2 rounded-full shadow-lg shadow-pink-200">DAFTAR</button>
        </div>
    </nav>

    <section class="p-4 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 mt-2">
        <div class="md:col-span-2 relative h-56 md:h-80 bg-slate-200 rounded-[35px] overflow-hidden shadow-xl shadow-pink-100">
            <div id="promo-slider" class="slider-container">
                <div class="slide-item active flex items-center justify-center bg-gradient-to-br from-[#ff85a2] to-[#f72585] text-white">
                    <div class="text-center">
                        <i class="fas fa-circle-notch animate-spin text-3xl mb-2"></i>
                        <p class="text-[10px] font-bold uppercase tracking-widest">Memuat Tren Global...</p>
                    </div>
                </div>
            </div>
            <div id="promo-dots" class="absolute bottom-5 left-10 flex gap-2 z-20"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="h-1/2 bg-sky-400 rounded-[30px] p-6 text-white relative overflow-hidden shadow-lg">
                <h3 class="font-black text-lg leading-tight uppercase">Quality <br> Choice 💎</h3>
                <p class="text-[10px] opacity-80 mt-1 uppercase font-bold tracking-widest text-nowrap">Premium Imported Item</p>
                <img src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png" class="absolute -right-2 bottom-0 w-20 opacity-40">
            </div>
            <div class="h-1/2 bg-orange-400 rounded-[30px] p-6 text-white relative overflow-hidden shadow-lg">
                <h3 class="font-black text-lg leading-tight uppercase">New <br> Arrivals 👗</h3>
                <p class="text-[10px] opacity-80 mt-1 uppercase font-bold tracking-widest">Global Fashion</p>
                <img src="https://cdn-icons-png.flaticon.com/512/3159/3159614.png" class="absolute -right-2 bottom-0 w-20 opacity-40">
            </div>
        </div>
    </section>

    <section class="max-w-6xl mx-auto px-4 mt-10">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h3 class="text-xl font-black text-slate-800 tracking-tight italic uppercase">Exclusive Collection 🌸</h3>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Imported Fashion Curator</p>
            </div>
        </div>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 mb-20">
            <div class="col-span-full text-center py-20 text-slate-400 text-[10px] font-black animate-pulse uppercase tracking-widest">
                Menyiapkan Koleksi Terbaik... ✨
            </div>
        </div>
    </section>

    <footer class="p-8 pt-12 text-slate-600 bg-white rounded-t-[40px]">
        <div class="text-center pb-4">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">© 2026 BeautyBloom. All Rights Reserved.</p>
        </div>
    </footer>

<script>
    let currentSlide = 0;

    window.onload = () => {
        fetchProducts();
        loadDynamicAds();
        loadPopupAd(); // Panggil fungsi popup saat load
    };

    // FUNGSI POPUP DARI ADMIN
    async function loadPopupAd() {
        const { data: popup } = await db.from('app_settings')
            .select('value_text, is_active')
            .eq('key_name', 'popup_banner')
            .single();

        if (popup && popup.is_active && popup.value_text) {
            const modal = document.getElementById('popupAdModal');
            const content = document.getElementById('popupContent');
            
            content.innerHTML = `<img src="${popup.value_text}" class="w-full aspect-square object-cover">`;
            
            // Munculkan dengan sedikit delay agar estetik
            setTimeout(() => {
                modal.classList.remove('hidden');
                document.body.classList.add('overflow-hidden'); // Kunci scroll
                setTimeout(() => modal.classList.add('show-modal'), 10);
            }, 1500);
        }
    }

    function closePopup() {
        const modal = document.getElementById('popupAdModal');
        modal.classList.remove('show-modal');
        setTimeout(() => {
            modal.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }, 3000); // Sesuaikan dengan durasi transisi
        
        // Simpan ke session agar tidak muncul terus menerus di sesi yang sama (opsional)
        sessionStorage.setItem('popup_shown', 'true');
    }

    // ... (Sisa fungsi fetchProducts dan loadDynamicAds tetap sama) ...
    async function loadDynamicAds() {
        const slider = document.getElementById('promo-slider');
        const dotsContainer = document.getElementById('promo-dots');
        const { data: setting } = await db.from('app_settings').select('value_text, is_active').eq('key_name', 'dashboard_banners').single();
        if (!setting || !setting.is_active || !setting.value_text) {
            slider.innerHTML = `<div class="slide-item active"><img src="https://via.placeholder.com/800x400?text=Beauty+Bloom+Fashion"></div>`;
            return;
        }
        try {
            const adImages = JSON.parse(setting.value_text);
            slider.innerHTML = adImages.map((imgUrl, i) => `<div class="slide-item ${i === 0 ? 'active' : ''}"><img src="${imgUrl}"></div>`).join('');
            dotsContainer.innerHTML = adImages.map((_, i) => `<div class="dot-ad ${i === 0 ? 'active' : ''}"></div>`).join('');
            if (adImages.length > 1) {
                setInterval(() => {
                    const slides = document.querySelectorAll('.slide-item');
                    const dots = document.querySelectorAll('.dot-ad');
                    if (slides.length === 0) return;
                    slides[currentSlide].classList.remove('active');
                    dots[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].classList.add('active');
                    dots[currentSlide].classList.add('active');
                }, 5000);
            }
        } catch (e) { console.error(e); }
    }

    async function fetchProducts() {
        const { data, error } = await db.from('produk').select('*').gt('stok_sekarang', 0).eq('tampil_online', true).order('created_at', { ascending: false });
        if (!error) renderProducts(data);
    }

    function renderProducts(list) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = list.map(p => `
            <div class="product-card bg-white rounded-[32px] p-3 shadow-sm border border-pink-50 flex flex-col h-full group">
                <div class="w-full aspect-[4/5] bg-slate-50 rounded-[26px] mb-3 overflow-hidden relative">
                    <img src="${p.image_url || 'https://via.placeholder.com/300x400'}" class="w-full h-full object-cover">
                </div>
                <div class="flex-grow px-2">
                    <h4 class="font-bold text-slate-700 text-[11px] leading-tight uppercase mb-1 line-clamp-2">${p.nama_barang}</h4>
                </div>
                <button onclick="handleProductClick()" class="mt-4 w-full bg-slate-50 hover:bg-pink-500 hover:text-white py-3.5 rounded-2xl text-[9px] font-black uppercase transition-all tracking-widest border border-pink-50">
                    Cek Detail Koleksi ✨
                </button>
            </div>
        `).join('');
    }

    async function handleProductClick() {
        const { data: { session } } = await db.auth.getSession();
        if (!session) {
            alert("Hai cantik! Silakan Login untuk melihat detail koleksi eksklusif kami. 🌸");
            window.location.href = "login-customer.html";
        } else {
            window.location.href = "online-shop.html"; 
        }
    }
</script>
</body>
</html>
