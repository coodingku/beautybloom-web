<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun | Beauty Bloom 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="supabase-online.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #fff0f3; background-image: radial-gradient(at 0% 0%, #ffe5ec 0, transparent 50%), radial-gradient(at 50% 0%, #fff0f3 0, transparent 50%); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .register-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-radius: 35px; padding: 40px 30px; width: 90%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(255, 133, 162, 0.25); text-align: center; border: 1px solid rgba(255, 255, 255, 0.4); }
        .btn-pink { background: linear-gradient(135deg, #ff85a2 0%, #f72585 100%); color: white; transition: all 0.3s; }
        .btn-pink:hover { transform: translateY(-2px); opacity: 0.9; }
        .input-bloom { background: #fffafa; border: 1px solid #ffe5ec; transition: 0.3s; }
        .input-bloom:focus { background: white; border-color: #ff85a2; box-shadow: 0 0 0 4px rgba(255, 133, 162, 0.1); }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-pink-50 rounded-full mb-4 text-pink-500 text-3xl">
            <i class="fa-solid fa-user-plus"></i>
        </div>
        <h1 class="text-2xl font-black text-slate-800 mb-1">Daftar Akun Baru</h1>
        <p class="text-sm text-slate-400 mb-6 font-bold uppercase tracking-wider">Beauty Bloom Community</p>

        <div class="space-y-3 text-left">
            <div>
                <label class="text-[10px] font-bold text-pink-400 ml-2 uppercase tracking-widest">Nama Lengkap</label>
                <input type="text" id="fullname" placeholder="Nama Lengkap" class="input-bloom w-full p-3.5 rounded-2xl outline-none text-slate-700 text-sm">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-bold text-pink-400 ml-2 uppercase tracking-widest">Email</label>
                    <input type="email" id="email" placeholder="email@contoh.com" class="input-bloom w-full p-3.5 rounded-2xl outline-none text-slate-700 text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-pink-400 ml-2 uppercase tracking-widest">WhatsApp</label>
                    <input type="number" id="phone" placeholder="628123..." class="input-bloom w-full p-3.5 rounded-2xl outline-none text-slate-700 text-sm">
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-pink-400 ml-2 uppercase tracking-widest">Alamat Pengiriman</label>
                <textarea id="address" placeholder="Alamat lengkap..." rows="2" class="input-bloom w-full p-3.5 rounded-2xl outline-none text-slate-700 text-sm resize-none"></textarea>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-bold text-pink-400 ml-2 uppercase tracking-widest">Password</label>
                    <input type="password" id="password" placeholder="******" class="input-bloom w-full p-3.5 rounded-2xl outline-none text-slate-700 text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-pink-400 ml-2 uppercase tracking-widest">Konfirmasi</label>
                    <input type="password" id="confirm-password" placeholder="******" class="input-bloom w-full p-3.5 rounded-2xl outline-none text-slate-700 text-sm">
                </div>
            </div>
        </div>

        <button onclick="handleRegister()" id="btnRegister" class="w-full btn-pink py-4 rounded-2xl font-black tracking-widest shadow-lg mt-6 active:scale-95 transition-all">
            DAFTAR SEKARANG ✨
        </button>
    </div>

    <script>
      async function handleRegister() {
    const fullname = document.getElementById('fullname').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const address = document.getElementById('address').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const btn = document.getElementById('btnRegister');

    if (!fullname || !email || !password || !confirmPassword || !phone || !address) {
        return alert("Lengkapi semua data ya! 🌸");
    }
    if (password !== confirmPassword) {
        return alert("Password tidak cocok! ❌");
    }

    btn.innerText = "Mendaftarkan...";
    btn.disabled = true;

    try {
        // 1. Daftar ke Auth + ATUR REDIRECT KE LOGIN CUSTOMER
        const { data: authData, error: authError } = await db.auth.signUp({
            email: email, 
            password: password,
            options: {
                // KUNCI: Link di email akan mengarah ke halaman ini
                emailRedirectTo: 'https://inventory-system26.vercel.app/login-customer.html'
            }
        });
        
        if (authError) throw authError;

        const user = authData.user;
        
        // 2. Tunggu sebentar agar Auth sinkron
        await new Promise(res => setTimeout(res, 1000));

        // 3. Simpan ke tabel customers
        const { error: dbError } = await db.from('customers').upsert([{
            id: user.id, 
            full_name: fullname,
            email: email,
            phone_number: phone, 
            address_shipping: address,
            created_at: new Date()
        }], { on_conflict: 'id' });

        if (dbError) throw dbError;

        // Pesan sukses yang lebih jelas bagi customer
        alert("Pendaftaran Berhasil! 🌸\n\nSilakan CEK EMAIL kamu untuk aktivasi akun sebelum login ya.");
        window.location.href = 'login-customer.html';

    } catch (error) {
        console.error("Error Detail:", error);
        alert("Gagal: " + error.message);
        btn.innerText = "DAFTAR SEKARANG ✨";
        btn.disabled = false;
    }
}
    </script>
</body>
</html>
