<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beauty Bloom | Dashboard 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-online.js"></script>
    <script type="text/javascript" src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="SB-Mid-client-YOUR_KEY"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff0f3; overflow-x: hidden; padding-bottom: 20px; }
        .gradient-pink { background: linear-gradient(135deg, #ff85a2 0%, #f72585 100%); }
        .menu-action-card { background: white; border-radius: 24px; padding: 14px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; border: 1px solid #ff85a215; transition: all 0.2s; box-shadow: 0 4px 12px rgba(247, 37, 133, 0.04); }
        .menu-action-card:active { scale: 0.95; background: #fff9fa; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); display: none; z-index: 999; }
        .modal-overlay.active { display: block; }
        .side-modal { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: white; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; border-radius: 40px 0 0 40px; }
        .side-modal.active { right: 0; }
        .activity-modal { position: fixed; bottom: -100%; left: 0; right: 0; background: white; z-index: 1000; border-radius: 35px 35px 0 0; transition: bottom 0.4s ease; padding-bottom: 30px; max-height: 85vh; display: flex; flex-direction: column; }
        .activity-modal.active { bottom: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .slider-wrapper { position: relative; width: 100%; aspect-ratio: 1 / 1; overflow: hidden; background: #fff; border-radius: 40px; margin-top: 10px; }
        .slide-item { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.8s ease; display: none; }
        .slide-item.active { opacity: 1; z-index: 10; display: block; }
        .slide-item img { width: 100%; height: 100%; object-fit: cover; }
        .dots-container { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 6px; z-index: 20; }
        .dot-ad { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.3s; }
        .dot-ad.active { background: white; width: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="p-6 pb-2">
        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-[10px] font-black text-pink-500 uppercase tracking-widest italic">Halo Cantik ✨</p>
                <h1 id="user-name" class="text-xl font-extrabold text-slate-800 italic uppercase leading-none">Memuat...</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="openNotifications()" class="relative w-11 h-11 bg-white rounded-2xl border-2 border-pink-50 flex items-center justify-center text-pink-500 shadow-sm active:scale-90 transition-all">
                    <i class="fa-solid fa-bell text-xl"></i>
                    <span id="notif-badge" class="hidden absolute top-2 right-2 w-3 h-3 bg-red-500 border-2 border-white rounded-full"></span>
                </button>
                <button onclick="openProfile()" class="w-11 h-11 bg-white rounded-2xl border-2 border-pink-50 flex items-center justify-center text-pink-500 shadow-sm active:scale-90 transition-all">
                    <i class="fa-solid fa-circle-user text-2xl"></i>
                </button>
            </div>
        </div>

        <div class="gradient-pink w-full p-7 rounded-[35px] text-white shadow-xl shadow-pink-200 relative overflow-hidden mb-6">
            <div class="relative z-10 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold uppercase tracking-widest opacity-80 mb-1">Saldo Anda</p>
                    <h2 id="display-saldo" class="text-3xl font-black italic tracking-tight">Rp 0</h2>
                </div>
                <button onclick="requestTopUp()" class="w-12 h-12 bg-white/20 backdrop-blur-md border border-white/30 rounded-xl flex items-center justify-center text-white text-xl active:scale-90 transition-all">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            <div class="absolute -right-6 -top-6 w-24 h-24 bg-white/10 rounded-full"></div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-4">
            <button onclick="window.location.href='online-shop.html'" class="menu-action-card">
                <div class="w-11 h-11 bg-pink-50 rounded-2xl flex items-center justify-center text-pink-500">
                    <i class="fa-solid fa-basket-shopping text-xl"></i>
                </div>
                <span class="text-[10px] font-black text-slate-700 uppercase italic">Belanja</span>
            </button>
            <button onclick="openHistory()" class="menu-action-card">
                <div class="w-11 h-11 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500">
                    <i class="fa-solid fa-receipt text-xl"></i>
                </div>
                <span class="text-[10px] font-black text-slate-700 uppercase italic">Transaksi</span>
            </button>
            <button onclick="toggleWallet()" class="menu-action-card">
                <div class="w-11 h-11 bg-purple-50 rounded-2xl flex items-center justify-center text-purple-500">
                    <i class="fa-solid fa-wallet text-xl"></i>
                </div>
                <span class="text-[10px] font-black text-slate-700 uppercase italic">Saldo</span>
            </button>
        </div>
    </header>

    <section class="px-6">
        <div id="promo-slider" class="slider-wrapper shadow-lg">
            <div class="slide-item active flex items-center justify-center bg-pink-50 text-pink-200">
                <i class="fa-solid fa-images text-4xl animate-pulse"></i>
            </div>
        </div>
        <div id="promo-dots" class="dots-container"></div>
    </section>

    <div id="modalOverlay" class="modal-overlay" onclick="closeAllModals()"></div>

    <div id="profileModal" class="side-modal no-scrollbar overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-black text-slate-800 italic">Akun Saya</h2>
            <button onclick="closeAllModals()"><i class="fa-solid fa-xmark text-slate-300 text-2xl"></i></button>
        </div>
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-pink-50 rounded-3xl mx-auto mb-4 flex items-center justify-center text-pink-500 text-4xl border-4 border-white shadow-md"><i class="fa-solid fa-user-ninja"></i></div>
            <h3 id="p-name" class="font-black text-slate-800 italic uppercase text-base">User</h3>
            <p id="p-email" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest italic">email@user.com</p>
        </div>
        <button onclick="window.open('https://wa.me/6281239739396')" class="w-full py-4 px-6 bg-slate-50 text-slate-700 rounded-2xl font-black text-[10px] uppercase flex justify-between items-center mb-4">
            <span><i class="fa-brands fa-whatsapp mr-2 text-green-500 text-sm"></i> Bantuan</span>
            <i class="fa-solid fa-chevron-right text-[8px]"></i>
        </button>
        <button onclick="logoutCustomer()" class="w-full py-4 bg-red-50 text-red-500 rounded-2xl font-black text-[10px] uppercase flex justify-center items-center gap-3 mt-10"><i class="fa-solid fa-power-off"></i> Keluar</button>
    </div>

    <div id="notifModal" class="activity-modal px-6">
        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto my-5"></div>
        <h2 class="text-lg font-black text-slate-800 mb-6 text-center italic uppercase">Pemberitahuan 🔔</h2>
        <div id="notifList" class="space-y-4 flex-1 overflow-y-auto no-scrollbar pb-6">
            </div>
        <button onclick="closeAllModals()" class="w-full py-4 bg-slate-100 text-slate-400 font-black rounded-2xl text-[10px] uppercase">Tutup</button>
    </div>

    <div id="walletModal" class="activity-modal px-6">
        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto my-5"></div>
        <h2 class="text-lg font-black text-slate-800 mb-6 text-center italic uppercase">Riwayat Saldo 💎</h2>
        <div id="walletHistory" class="space-y-3 flex-1 overflow-y-auto no-scrollbar pb-6"></div>
        <button onclick="closeAllModals()" class="w-full py-4 bg-slate-100 text-slate-400 font-black rounded-2xl text-[10px] uppercase">Tutup</button>
    </div>

    <div id="historyModal" class="activity-modal px-6">
        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto my-5"></div>
        <h2 class="text-lg font-black text-slate-800 mb-6 text-center italic uppercase">Riwayat Belanja 🛍️</h2>
        <div id="historyList" class="space-y-4 flex-1 overflow-y-auto no-scrollbar pb-6"></div>
        <button onclick="closeAllModals()" class="w-full py-4 bg-slate-100 text-slate-400 font-black rounded-2xl text-[10px] uppercase">Tutup</button>
    </div>

    <script>
        let userData = null;
        let currentSlide = 0;

        window.onload = async () => {
            const { data: { session } } = await db.auth.getSession();
            if (!session) return window.location.replace('login-customer.html');
            await loadCustomerData(session.user.id);
            await loadDynamicAds();
            await loadNotifications(); // Panggil notif saat start
            
          // TAMBAHKAN INI: Daftar Push Notif ke HP
        if (typeof registerPushNotification === 'function') {
        registerPushNotification(session.user.id);
    }
};

        async function loadCustomerData(userId) {
            const { data: customer } = await db.from('customers').select('*').eq('id', userId).single();
            if (customer) {
                userData = customer;
                document.getElementById('user-name').innerText = customer.full_name;
                document.getElementById('display-saldo').innerText = "Rp " + (customer.saldo || 0).toLocaleString();
            }
        }

        // --- SISTEM NOTIFIKASI (FIXED) ---
        async function loadNotifications() {
            const container = document.getElementById('notifList');
            container.innerHTML = "";
            let hasNew = false;

            try {
                // 1. Cek Promo Admin
                const { data: promo } = await db.from('app_settings').select('*').eq('key_name', 'promo_announcement').eq('is_active', true).single();
                if (promo) {
                    hasNew = true;
                    window.currentPromo = promo.value_text;
                    container.innerHTML += `
                        <div class="bg-pink-50 p-5 rounded-[28px] border border-pink-100 relative overflow-hidden">
                            <span class="px-2 py-0.5 bg-pink-500 text-[8px] text-white font-black rounded-md uppercase">Promo</span>
                            <p class="text-xs text-slate-700 font-bold mt-2">${promo.value_text}</p>
                            <i class="fa-solid fa-bullhorn absolute -right-3 -bottom-3 text-4xl text-pink-200/30"></i>
                        </div>`;
                }

                // 2. Cek Transaksi Selesai Terbaru
                const { data: trx } = await db.from('transaksi_online').select('*').eq('customer_id', userData.id).eq('status_order', 'Selesai').order('created_at', { ascending: false }).limit(1);
                if (trx && trx.length > 0) {
                    hasNew = true;
                    container.innerHTML += `
                        <div class="bg-blue-50 p-5 rounded-[28px] border border-blue-100 relative overflow-hidden">
                            <span class="px-2 py-0.5 bg-blue-500 text-[8px] text-white font-black rounded-md uppercase">Berhasil</span>
                            <p class="text-xs text-slate-700 font-bold mt-2">Pesanan #${trx[0].no_invoice} telah selesai. Terima kasih! 🌸</p>
                            <i class="fa-solid fa-check-double absolute -right-3 -bottom-3 text-4xl text-blue-200/30"></i>
                        </div>`;
                }

                if (hasNew) document.getElementById('notif-badge').classList.remove('hidden');
                else container.innerHTML = `<p class="text-center py-10 text-slate-300 italic text-xs uppercase">Tidak ada pesan baru</p>`;

            } catch (e) { console.log(e); }
        }

        function openNotifications() {
            closeAllModals();
            document.getElementById('notifModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('notif-badge').classList.add('hidden');
        }

        // --- RIWAYAT SALDO & TRANSAKSI (FUNGSI ASLI ANDA) ---
        async function toggleWallet() {
            closeAllModals();
            document.getElementById('walletModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
            const container = document.getElementById('walletHistory');
            container.innerHTML = `<p class="text-center py-10 italic text-xs text-slate-400">Mencari data...</p>`;
            try {
                const [topupRes, withdrawRes] = await Promise.all([
                    db.from('topup_history').select('*').eq('customer_id', userData.id).order('created_at', { ascending: false }),
                    db.from('withdraw_requests').select('*').eq('customer_id', userData.id).order('created_at', { ascending: false })
                ]);
                let combined = [];
                if (topupRes.data) combined.push(...topupRes.data.map(i => ({...i, tipe: 'MASUK'})));
                if (withdrawRes.data) combined.push(...withdrawRes.data.map(i => ({...i, tipe: 'KELUAR'})));
                combined.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                if (combined.length === 0) {
                    container.innerHTML = `<p class="text-center py-10 italic text-xs text-slate-300 uppercase">Belum ada mutasi</p>`;
                    return;
                }
                container.innerHTML = combined.map(h => {
                    const isMasuk = h.tipe === 'MASUK';
                    const color = h.status === 'SUCCESS' ? (isMasuk ? 'text-green-500' : 'text-red-500') : 'text-slate-400';
                    return `
                    <div class="bg-white p-4 rounded-2xl border border-slate-50 flex justify-between items-center shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 ${isMasuk ? 'bg-green-50 text-green-500' : 'bg-red-50 text-red-500'} rounded-xl flex items-center justify-center"><i class="fa-solid ${isMasuk ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'}"></i></div>
                            <div><p class="font-black text-slate-800 text-[10px] uppercase leading-none mb-1">${h.no_invoice || 'TRX'}</p><p class="text-[8px] text-slate-400 font-bold uppercase">${h.status}</p></div>
                        </div>
                        <p class="font-black italic text-[12px] ${color}">${isMasuk ? '+' : '-'} Rp ${h.nominal.toLocaleString()}</p>
                    </div>`;
                }).join('');
            } catch (err) { container.innerHTML = `<p class="text-center py-10 text-red-400 text-xs">Gagal memuat.</p>`; }
        }

        async function openHistory() {
            closeAllModals();
            document.getElementById('historyModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
            const container = document.getElementById('historyList');
            container.innerHTML = `<p class="text-center py-10 text-slate-400 text-xs italic">Memuat...</p>`;
            const { data } = await db.from('transaksi_online').select('*').eq('customer_id', userData.id).order('created_at', { ascending: false });
            const filtered = data ? data.filter(trx => ['Selesai', 'Dibatalkan'].includes(trx.status_order)) : [];
            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-center py-10 italic text-xs text-slate-400 font-black uppercase">Belum ada riwayat</p>`;
                return;
            }
            container.innerHTML = filtered.map(t => `
                <div class="p-5 bg-white rounded-[28px] border border-slate-100 shadow-sm ${t.status_order === 'Dibatalkan' ? 'opacity-60 grayscale' : ''}">
                    <div class="flex justify-between mb-3"><span class="text-[9px] font-black text-slate-400 uppercase">#${t.no_invoice}</span><span class="text-[9px] font-black ${t.status_order === 'Dibatalkan' ? 'text-red-400' : 'text-green-500'} uppercase">${t.status_order}</span></div>
                    <div class="flex justify-between items-end"><p class="text-[8px] text-slate-400 font-bold uppercase">${new Date(t.created_at).toLocaleDateString('id-ID')}</p><p class="font-black text-slate-800 text-sm italic">Rp ${t.grand_total.toLocaleString()}</p></div>
                </div>`).join('');
        }

        // --- LAINNYA ---
        async function loadDynamicAds() {
            const slider = document.getElementById('promo-slider');
            const dotsContainer = document.getElementById('promo-dots');
            const { data: setting } = await db.from('app_settings').select('value_text, is_active').eq('key_name', 'dashboard_banners').single();
            if (!setting || !setting.is_active || !setting.value_text) return;
            try {
                const adImages = JSON.parse(setting.value_text);
                slider.innerHTML = adImages.map((imgUrl, i) => `<div class="slide-item ${i === 0 ? 'active' : ''}"><img src="${imgUrl}"></div>`).join('');
                dotsContainer.innerHTML = adImages.map((_, i) => `<div class="dot-ad ${i === 0 ? 'active' : ''}"></div>`).join('');
                if (adImages.length > 1) startAutoSlide(adImages.length);
            } catch (e) { console.error(e); }
        }

        function startAutoSlide(total) {
            setInterval(() => {
                const slides = document.querySelectorAll('.slide-item');
                const dots = document.querySelectorAll('.dot-ad');
                if(!slides[currentSlide]) return;
                slides[currentSlide].classList.remove('active'); 
                dots[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % total;
                slides[currentSlide].classList.add('active'); 
                dots[currentSlide].classList.add('active');
            }, 5000);
        }

        function openProfile() {
            document.getElementById('p-name').innerText = userData.full_name;
            document.getElementById('p-email').innerText = userData.email;
            document.getElementById('profileModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeAllModals() {
            document.querySelectorAll('.side-modal, .activity-modal').forEach(m => m.classList.remove('active'));
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function requestTopUp() {
            const nom = prompt("Nominal Top Up:", "50000");
            if (!nom || nom < 10000) return alert("Minimal Rp 10.000");
            const inv = "TOPUP-" + Date.now();
            await db.from('topup_history').insert([{ no_invoice: inv, customer_id: userData.id, nominal: parseInt(nom), status: 'PENDING' }]);
            try {
                const res = await fetch("https://uojhjskgugghwxtdsfvm.supabase.co/functions/v1/smart-endpoint", {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: inv, amount: parseInt(nom), customer_name: userData.full_name, customer_email: userData.email })
                });
                const d = await res.json();
                if (d.token) window.snap.pay(d.token, { onSuccess: () => location.reload() });
            } catch (e) { alert("Server sibuk."); }
        }

        async function logoutCustomer() {
            if (confirm("Keluar?")) { await db.auth.signOut(); window.location.replace('login-customer.html'); }
        }
    </script>
</body>
</html>
