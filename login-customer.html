<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome | Beauty Bloom Shop 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="supabase-online.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #fff0f3; background-image: radial-gradient(at 0% 0%, #ffe5ec 0, transparent 50%), radial-gradient(at 50% 0%, #fff0f3 0, transparent 50%); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .login-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-radius: 35px; padding: 40px 30px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(255, 133, 162, 0.25); text-align: center; border: 1px solid rgba(255, 255, 255, 0.4); animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-pink { background: linear-gradient(135deg, #ff85a2 0%, #f72585 100%); color: white; transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(247, 37, 133, 0.3); }
        .btn-pink:hover { transform: translateY(-2px); opacity: 0.9; }
        .input-bloom { background: #fffafa; border: 1px solid #ffe5ec; transition: 0.3s; }
        .input-bloom:focus { border-color: #ff85a2; box-shadow: 0 0 0 4px rgba(255, 133, 162, 0.1); outline: none; }
        .method-btn.active { background: white; color: #f72585; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-pink-50 rounded-full mb-6 text-pink-500 text-4xl shadow-inner">
            <i class="fa-solid fa-wand-sparkles"></i>
        </div>
        
        <h1 class="text-3xl font-black text-slate-800 mb-1">Beauty Bloom</h1>
        <p class="text-sm text-slate-400 mb-6 uppercase tracking-[2px] font-bold">Member Area</p>

        <div class="flex p-1 bg-pink-50 rounded-2xl mb-6">
            <button onclick="switchMethod('email')" id="tab-email" class="method-btn active flex-1 py-2 text-[10px] font-bold uppercase rounded-xl transition-all">Email</button>
            <button onclick="switchMethod('phone')" id="tab-phone" class="method-btn flex-1 py-2 text-[10px] font-bold uppercase rounded-xl transition-all text-slate-400">WhatsApp</button>
        </div>

        <div class="space-y-4 text-left">
            <div>
                <label id="label-identifier" class="text-[10px] font-bold text-pink-400 ml-2 uppercase">Alamat Email</label>
                <input type="text" id="identifier" placeholder="nama@email.com" class="input-bloom w-full p-4 rounded-2xl outline-none text-slate-700 text-sm mt-1">
            </div>
            <div>
                <div class="flex justify-between items-center px-2">
                    <label class="text-[10px] font-bold text-pink-400 uppercase">Password</label>
                    <button onclick="forgotPassword()" class="text-[10px] font-bold text-slate-400 hover:text-pink-500">Lupa Password?</button>
                </div>
                <input type="password" id="password" placeholder="******" class="input-bloom w-full p-4 rounded-2xl outline-none text-slate-700 text-sm mt-1">
            </div>
        </div>

        <button onclick="handleLogin()" id="btnLogin" class="w-full btn-pink py-4 rounded-2xl font-black tracking-widest shadow-lg mt-8 active:scale-95 transition-all">
            MASUK SEKARANG ✨
        </button>

        <p class="mt-8 text-xs text-slate-400 font-semibold">
            Baru di Bloom? 
            <a href="register-customer.html" class="text-pink-500 font-bold hover:underline">Daftar Akun</a>
        </p>
    </div>

    <script>
        let currentMethod = 'email';

        window.onload = async () => {
            const { data: { session } } = await db.auth.getSession();
            if (session) window.location.href = 'index_online.html';
        };

        function switchMethod(method) {
            currentMethod = method;
            const label = document.getElementById('label-identifier');
            const input = document.getElementById('identifier');
            const tabEmail = document.getElementById('tab-email');
            const tabPhone = document.getElementById('tab-phone');

            if (method === 'email') {
                label.innerText = 'Alamat Email';
                input.placeholder = 'nama@email.com';
                input.type = 'email';
                tabEmail.classList.add('active', 'text-pink-500');
                tabPhone.classList.remove('active', 'text-pink-500');
                tabPhone.classList.add('text-slate-400');
            } else {
                label.innerText = 'Nomor WhatsApp';
                input.placeholder = '628123456...';
                input.type = 'number';
                tabPhone.classList.add('active', 'text-pink-500');
                tabEmail.classList.remove('active', 'text-pink-500');
                tabEmail.classList.add('text-slate-400');
            }
        }

        async function handleLogin() {
            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            if (!identifier || !password) return alert("Mohon lengkapi data login! 🌸");

            btn.innerText = "MENGECEK...";
            btn.disabled = true;

            try {
                let emailToLogin = identifier;

                if (currentMethod === 'phone') {
                    const { data: customer, error: findError } = await db
                        .from('customers')
                        .select('email')
                        .eq('phone_number', identifier)
                        .single();

                    if (findError || !customer) throw new Error("Nomor WhatsApp tidak terdaftar!");
                    emailToLogin = customer.email;
                }

                const { data, error } = await db.auth.signInWithPassword({
                    email: emailToLogin,
                    password: password
                });

                if (error) throw error;
                window.location.href = 'index_online.html';

            } catch (error) {
                alert("Login Gagal: " + error.message);
                btn.innerText = "MASUK SEKARANG ✨";
                btn.disabled = false;
            }
        }

        async function forgotPassword() {
            const idInput = prompt("Masukkan Email atau No. WhatsApp kamu untuk reset password:");
            if (!idInput) return;

            let emailToReset = idInput;

            try {
                if (!idInput.includes('@')) {
                    const { data, error } = await db
                        .from('customers')
                        .select('email')
                        .eq('phone_number', idInput)
                        .single();
                    
                    if (error || !data) throw new Error("Data tidak ditemukan.");
                    emailToReset = data.email;
                }

                const { error } = await db.auth.resetPasswordForEmail(emailToReset, {
                    redirectTo: window.location.origin + '/reset-password.html',
                });

                if (error) throw error;
                alert("Link reset password telah dikirim ke email: " + emailToReset + " 🌸");

            } catch (err) {
                alert("Gagal: " + err.message);
            }
        }
    </script>
</body>
</html>
